; PlatformIO project: both ESP32-S3 roles as separate environments.
; Shared wire format lives in include/protocol.h and is built into both.

[platformio]
src_dir = src

[env]
; pioarduino fork gives Arduino-ESP32 core 3.x with full S3 support.
; The official espressif32 platform lags it. Pin a release tag when you
; want reproducible builds; #main always resolves during bring-up.
platform = https://github.com/pioarduino/platform-espressif32.git#main
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build only the source folder for the role being flashed. Without this,
; PlatformIO would compile both controller and receiver into one binary.
;
; Each role is pinned to its physical board by the CH343 bridge port path.
; macOS derives that name from the chip's serial number, so it is stable for
; these two boards across reconnects, letting `-e controller` / `-e receiver`
; find the right board with no --port. These paths are macOS specific and tied
; to these boards; if a name ever changes, recheck with `pio device list`.
[env:controller]
build_src_filter = +<controller/>
upload_port = /dev/cu.usbmodem5B901723461
monitor_port = /dev/cu.usbmodem5B901723461

[env:receiver]
build_src_filter = +<receiver/>
upload_port = /dev/cu.usbmodem5B901722471
monitor_port = /dev/cu.usbmodem5B901722471
